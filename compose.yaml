services:
  node1:
    build: .
    environment:
      NODE_ID: node1
      PEERS: node2:5000,node3:5000
    ports:
      - "5001:5000"
    networks:
      - distnet

  node2:
    build: .
    environment:
      NODE_ID: node2
      PEERS: node1:5000,node3:5000
    ports:
      - "5002:5000"
    networks:
      - distnet

  node3:
    build: .
    environment:
      NODE_ID: node3
      PEERS: node1:5000,node2:5000
    ports:
      - "5003:5000"
    networks:
      - distnet

networks:
  distnet:
    driver: bridge